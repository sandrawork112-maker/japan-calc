<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>向日選物自用成本售價計算機</title>
    <style>
        :root {
            --primary-blue: #1e3a8a;      /* 專業深海藍 */
            --secondary-blue: #3b82f6;    /* 亮麗天藍 */
            --brand-orange: #f97316;      /* 活力暖橘 */
            --hover-orange: #ea580c;      /* 深暖橘 */
            --background-color: #f8fafc;  /* 舒適淺灰底 */
            --card-color: #ffffff;
            --text-dark: #1e293b;
            --success-green: #16a34a;
        }
        
        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--background-color);
            color: var(--text-dark);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-color);
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(30, 58, 138, 0.08);
            padding: 30px;
            width: 100%;
            max-width: 520px;
            box-sizing: border-box;
            border: 1px solid #e2e8f0;
        }

        h2 {
            text-align: center;
            color: var(--primary-blue);
            margin-bottom: 5px;
            font-size: 24px;
            letter-spacing: 1px;
            font-weight: 800;
        }

        .brand-sub {
            text-align: center;
            font-size: 14px;
            color: var(--brand-orange);
            font-weight: bold;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .rate-badge {
            background-color: #eff6ff;
            color: var(--secondary-blue);
            padding: 10px 12px;
            border-radius: 10px;
            font-size: 13px;
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
            border: 1px solid #bfdbfe;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .input-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            font-size: 13px;
            color: #475569;
        }

        input, select {
            width: 100%;
            padding: 11px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            font-size: 15px;
            box-sizing: border-box;
            transition: all 0.3s;
            color: var(--text-dark);
        }

        input:focus, select:focus {
            border-color: var(--secondary-blue);
            outline: none;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--brand-orange);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
            margin-top: 10px;
            box-shadow: 0 4px 12px rgba(249, 115, 22, 0.2);
        }

        button:hover {
            background-color: var(--hover-orange);
        }

        button:active {
            transform: scale(0.98);
        }

        /* 報價與成本利潤面板 */
        .result-box {
            margin-top: 20px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            border: 1px solid #e2e8f0;
        }

        .section-title {
            padding: 10px 14px;
            font-size: 13px;
            font-weight: bold;
            color: white;
        }
        .bg-blue { background-color: var(--primary-blue); }
        .bg-orange { background-color: var(--brand-orange); }
        .bg-green { background-color: var(--success-green); }

        .detail-body {
            background-color: #fff;
            padding: 14px;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .result-item:last-child { margin-bottom: 0; }

        .highlight-text {
            font-size: 24px;
            font-weight: bold;
            color: var(--brand-orange);
            text-align: center;
            padding: 18px 0;
            background-color: #fff7ed;
            border-top: 1px solid #ffedd5;
        }

        .profit-text {
            font-size: 18px;
            font-weight: bold;
            color: var(--success-green);
        }

        .note {
            font-size: 11px;
            color: #64748b;
            margin-top: 20px;
            text-align: center;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>向日選物自用成本售價計算機</h2>
    <div class="brand-sub">SUNNY SELECT</div>
    
    <div class="rate-badge" id="liveRateBox">
        🔄 正在獲取今天日幣即時匯率...
    </div>
    
    <div class="input-group">
        <label for="jpPrice">日本商品含稅定價 (日幣 ¥)</label>
        <input type="number" id="jpPrice" placeholder="例如: 3000">
    </div>

    <div class="grid-2">
        <div class="input-group">
            <label for="costRate">真實換匯成本匯率</label>
            <input type="number" id="costRate" step="0.0001" placeholder="例如: 0.2150">
        </div>
        <div class="input-group">
            <label for="sellRate">想開給客人的報價匯率</label>
            <input type="number" id="sellRate" step="0.0001" placeholder="例如: 0.28或0.3" value="0.28">
        </div>
    </div>

    <div class="input-group">
        <label for="profitType">額外利潤（代購費）計算方式</label>
        <select id="profitType" onchange="toggleProfitInput()">
            <option value="none">無外加代購費（純賺匯差）</option>
            <option value="fixed">固定每件外加定額利潤 (台幣)</option>
            <option value="percent">按客人售價外加抽成 (%)</option>
        </select>
    </div>

    <div class="input-group" id="profitFixedGroup" style="display: none;">
        <label for="profitFixed">外加固定代購費 (台幣 $)</label>
        <input type="number" id="profitFixed" placeholder="例如: 100" value="100">
    </div>

    <div class="input-group" id="profitPercentGroup" style="display: none;">
        <label for="profitPercent">外加抽成趴數 (%)</label>
        <input type="number" id="profitPercent" placeholder="例如: 10" value="10">
    </div>

    <div class="grid-2">
        <div class="input-group">
            <label for="gatewayFee">第三方金流服務</label>
            <select id="gatewayFee">
                <option value="0.028">藍新/綠界 刷卡 (2.8%)</option>
                <option value="0.015">藍新/綠界 虛擬帳號 (1.5%)</option>
                <option value="0">無使用金流 (0%)</option>
            </select>
        </div>
        <div class="input-group">
            <label for="shipping">台灣國內運費 (台幣)</label>
            <input type="number" id="shipping" value="38">
        </div>
    </div>

    <button onclick="calculateAll()">一鍵精準分析售價與利潤</button>

    <div id="resultPanel" style="display: none;">
        
        <div class="result-box">
            <div class="section-title bg-orange">🎯 開給客人的最終總報價 (已含運費與金流)</div>
            <div class="highlight-text" id="outTotal">$ 0</div>
        </div>

        <div class="result-box">
            <div class="section-title bg-blue">📊 你的真實營運成本拆解</div>
            <div class="detail-body">
                <div class="result-item">
                    <span>商品日幣換算真實台幣成本：</span>
                    <span id="outRealCost">$ 0</span>
                </div>
                <div class="result-item">
                    <span>金流平台收走的手續費：</span>
                    <span id="outGatewayFee">$ 0</span>
                </div>
                <div class="result-item">
                    <span>台灣國內運費成本：</span>
                    <span id="outShippingCost">$ 0</span>
                </div>
                <div class="result-item" style="font-weight: bold; border-top: 1px solid #e2e8f0; padding-top: 8px; margin-top: 8px; color: var(--primary-blue);">
                    <span>總支出成本合計：</span>
                    <span id="outTotalCost">$ 0</span>
                </div>
            </div>
        </div>

        <div class="result-box">
            <div class="section-title bg-green">💰 這一單你放進口袋的淨利潤</div>
            <div class="detail-body">
                <div class="result-item">
                    <span>純匯差賺到的利潤：</span>
                    <span id="outExchangeProfit">$ 0</span>
                </div>
                <div class="result-item">
                    <span>外加的代購服務費：</span>
                    <span id="outServiceProfit">$ 0</span>
                </div>
                <div class="result-item" style="border-top: 1px dashed #cbd5e1; padding-top: 8px; margin-top: 8px;">
                    <span class="profit-text">實拿淨利潤總計：</span>
                    <span class="profit-text" id="outNetProfit">$ 0</span>
                </div>
            </div>
        </div>
    </div>
    
    <div class="note">
        向日選物專屬商業公式：最終總報價 = (報價匯率台幣售價 + 外加代購費 + 國內運費) / (1 - 金流費率)<br>
        系統會自動用最終總報價扣除所有真實成本，為您算出最精準的淨利潤。
    </div>
</div>

<script>
    // 網頁開啟時，自動向公開 API 抓取日幣對台幣的即時匯率
    window.onload = function() {
        fetch('https://open.er-api.com/v6/latest/JPY')
            .then(response => response.json())
            .then(data => {
                const rateTWD = data.rates.TWD;
                if(rateTWD) {
                    const formattedRate = rateTWD.toFixed(4);
                    document.getElementById('liveRateBox').innerHTML = `📈 今日日幣即時匯率參考成本：<b>${formattedRate}</b> (已自動同步)`;
                    document.getElementById('costRate').value = formattedRate;
                }
            })
            .catch(error => {
                document.getElementById('liveRateBox').innerHTML = `⚠️ 無法自動更新匯率，請手動輸入成本匯率（例如 0.2150）`;
                document.getElementById('costRate').value = "0.2150";
            });
    }

    function toggleProfitInput() {
        const type = document.getElementById('profitType').value;
        document.getElementById('profitFixedGroup').style.display = (type === 'fixed') ? 'block' : 'none';
        document.getElementById('profitPercentGroup').style.display = (type === 'percent') ? 'block' : 'none';
    }

    function calculateAll() {
        const jpPrice = parseFloat(document.getElementById('jpPrice').value) || 0;
        const costRate = parseFloat(document.getElementById('costRate').value) || 0;
        const sellRate = parseFloat(document.getElementById('sellRate').value) || 0;
        const profitType = document.getElementById('profitType').value;
        const gatewayRate = parseFloat(document.getElementById('gatewayFee').value);
        const shipping = parseFloat(document.getElementById('shipping').value) || 0;

        if (jpPrice <= 0) {
            alert('請輸入正確的日幣商品含稅定價喔！');
            return;
        }

        // --- 1. 計算給客人的基礎台幣價格（使用報價匯率） ---
        const baseSellPrice = Math.round(jpPrice * sellRate);

        // --- 2. 計算外加的代購費 ---
        let serviceProfit = 0;
        if (profitType === 'fixed') {
            serviceProfit = parseFloat(document.getElementById('profitFixed').value) || 0;
        } else if (profitType === 'percent') {
            const percent = parseFloat(document.getElementById('profitPercent').value) || 0;
            serviceProfit = Math.round(baseSellPrice * (percent / 100));
        }

        // --- 3. 倒算包含金流手續費轉嫁的「最終總報價」 ---
        const subTotal = baseSellPrice + serviceProfit + shipping;
        let finalTotal = Math.ceil(subTotal / (1 - gatewayRate));
        
        // --- 4. 反推金流手續費 ---
        const gatewayFee = Math.round(finalTotal * gatewayRate);

        // --- 5. 真實成本計算（使用你換匯的真實成本匯率） ---
        const realGoodsCost = Math.round(jpPrice * costRate);
        const totalCost = realGoodsCost + gatewayFee + shipping;

        // --- 6. 淨利潤計算 ---
        const exchangeProfit = baseSellPrice - realGoodsCost;
        const netProfit = finalTotal - totalCost;

        // --- 7. 渲染到網頁畫面上 ---
        document.getElementById('outTotal').innerText = '$ ' + finalTotal.toLocaleString() + ' 元';
        
        // 成本區
        document.getElementById('outRealCost').innerText = '$ ' + realGoodsCost.toLocaleString();
        document.getElementById('outGatewayFee').innerText = '$ ' + gatewayFee.toLocaleString();
        document.getElementById('outShippingCost').innerText = '$ ' + shipping.toLocaleString();
        document.getElementById('outTotalCost').innerText = '$ ' + totalCost.toLocaleString();
        
        // 利潤區
        document.getElementById('outExchangeProfit').innerText = '$ ' + exchangeProfit.toLocaleString();
        document.getElementById('outServiceProfit').innerText = '$ ' + serviceProfit.toLocaleString();
        document.getElementById('outNetProfit').innerText = '$ ' + netProfit.toLocaleString() + ' 元';

        document.getElementById('resultPanel').style.display = 'block';
    }
</script>

</body>
</html>
